[package]
name = "rustcrypto-ffi"
version = "0.1.0"
edition = "2024"

[dependencies]
chacha20poly1305 = "0.10.1"
const-oid = "0.9.6"
digest = "0.11.2"
ed25519 = { version = "2.2.3", features = ["alloc", "pkcs8"] }
ed25519-dalek = { version = "2.2.0", features = ["pkcs8", "signature"] }
hkdf = "0.13.0"
hmac = "0.13.0"
k256 = "0.13.4"
pem-rfc7468 = "1.0.0"
sha2 = "0.11.0"
sha3 = "0.11.0"

[lib]
name = "rust_crypto_ffi"
crate-type = ["staticlib"]
