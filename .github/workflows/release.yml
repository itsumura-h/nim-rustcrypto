name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  build-release-asset:
    runs-on: ubuntu-latest

    steps:
      # ソースと履歴を取得し、タグ由来のリリース作成に必要な情報を揃える。
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Rust FFI をビルドするための toolchain を入れる。
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Nim パッケージのテストとインストール検証に必要な Nim/Nimble を入れる。
      - name: Install Nim toolchain
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.0.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # runner 側の PATH 問題を早期に検出できるよう、利用する Nim/Nimble をログに残す。
      - name: Print Nim versions
        run: |
          nim -v
          nimble -v

      # タグ push と workflow_dispatch の両方で使える version を決める。
      - name: Resolve version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${INPUT_VERSION:-}" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # まず Rust 側のユニットテストを回して、リリース前提の健全性を確認する。
      - name: Run Rust tests
        run: |
          cd src/rustcrypto-ffi
          cargo test

      # release 用の静的ライブラリを生成する。
      - name: Build Rust static library
        run: |
          cd src/rustcrypto-ffi
          cargo build --release --lib
          test -s target/release/librust_crypto_ffi.a

      # 生成物を Nim パッケージの vendor 配置へ同期し、同封物としても利用できることを確認する。
      - name: Sync Rust static library to Nim vendor tree
        run: |
          mkdir -p src/nim-rustcrypto/src/rustcrypto/vendor/rustcrypto-ffi/linux-x86_64
          cp src/rustcrypto-ffi/target/release/librust_crypto_ffi.a \
            src/nim-rustcrypto/src/rustcrypto/vendor/rustcrypto-ffi/linux-x86_64/librust_crypto_ffi.a

      # 同封済みの静的アーカイブで Nim テストを回し、Rust 側の生成物とパッケージ配布形態を両方確認する。
      - name: Run Nim tests
        run: |
          cd src/nim-rustcrypto
          nimble test -y

      # 利用側プロジェクト相当の一時環境で、Nimble install 後に import とリンクが通ることを確認する。
      - name: Verify Nimble consumer install
        shell: bash
        run: |
          set -eu
          consumer_dir="$(mktemp -d)"
          package_dir="$PWD/src/nim-rustcrypto"
          export NIMBLE_DIR="$consumer_dir/.nimble"
          mkdir -p "$consumer_dir/app"
          cd "$consumer_dir/app"
          cat > consumer.nimble <<EOF
          version = "0.1.0"
          author = "CI"
          description = "rustcrypto consumer smoke test"
          license = "MIT"
          srcDir = "."
          bin = @["main"]
          requires "nim >= 2.0.0"
          EOF
          cat > main.nim <<EOF
          import rustcrypto/algorithm/sha256

          doAssert sha256Hex("abc") == "ba7816bf8f01cfea414140de5dae2223b00361a396177a9cb410ff61f20015ad"
          EOF
          (cd "$package_dir" && nimble install -y)
          printf '%s\n' 'requires "rustcrypto >= 0.1.0"' >> consumer.nimble
          nimble c -r -y main.nim
          installed_dir="$(nimble path rustcrypto | tail -n 1)"
          test -s "$installed_dir/rustcrypto/vendor/rustcrypto-ffi/linux-x86_64/librust_crypto_ffi.a"

      # 追加で必要になるネイティブ静的ライブラリをログに残す。
      - name: Print native static libs
        run: |
          cd src/rustcrypto-ffi
          cargo rustc --release --lib -- --print native-static-libs | tee native-static-libs.txt

      # 配布用の tar.gz に入れるディレクトリ構造を作り、checksum も生成する。
      - name: Stage release archive
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          stage_dir="src/rustcrypto-ffi/dist/rustcrypto-ffi/linux-x86_64"
          archive_dir="src/rustcrypto-ffi/dist"
          archive_name="rustcrypto-ffi-v${version}-linux-x86_64.tar.gz"
          mkdir -p "$stage_dir"
          cp src/rustcrypto-ffi/target/release/librust_crypto_ffi.a "$stage_dir/librust_crypto_ffi.a"
          tar -C "src/rustcrypto-ffi/dist" -czf "$archive_dir/$archive_name" rustcrypto-ffi
          (cd "$archive_dir" && sha256sum "$archive_name" > "$archive_name.sha256")

      # 生成した tar.gz と sha256 を GitHub Release asset として公開する。
      - name: Upload GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: v${{ steps.version.outputs.version }}
          files: |
            src/rustcrypto-ffi/dist/rustcrypto-ffi-v${{ steps.version.outputs.version }}-linux-x86_64.tar.gz
            src/rustcrypto-ffi/dist/rustcrypto-ffi-v${{ steps.version.outputs.version }}-linux-x86_64.tar.gz.sha256
          generate_release_notes: true
