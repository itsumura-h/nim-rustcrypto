name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  docker-compose-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build app image
        run: docker compose build app

      - name: Start app service
        run: docker compose up -d app

      - name: Run Rust tests
        run: docker compose exec -T app bash -lc 'cd /application/src/rustcrypto-ffi && cargo test'

      - name: Build Rust static library
        run: docker compose exec -T app bash -lc 'cd /application/src/rustcrypto-ffi && cargo build --release --lib'

      - name: Run Nim tests
        run: docker compose exec -T app bash -lc 'cd /application/src/nim-rustcrypto && nimble test -y'

      - name: Stop compose services
        if: always()
        run: docker compose down --remove-orphans
