name: test

on:
  pull_request:

permissions:
  contents: read

jobs:
  # Linux x86_64 上の開発用 Docker イメージで、既存の test.sh（Rust + wasm/wasi クロスビルド + Nim）を実行する。
  linux-x86_64-docker-compose:
    name: Linux x86_64 (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build app image
        run: docker compose build app

      - name: Start app service
        run: docker compose up -d app

      - name: Run package checks
        run: docker compose exec -T app bash -lc '/application/test.sh'

      - name: Stop compose services
        if: always()
        run: docker compose down --remove-orphans

  # Apple Silicon 上で Rust（ネイティブ）と Nim（nimble test）のみ動作確認する。
  # wasm / wasi（blst の C ビルドを含む）は Linux Docker ジョブで検証する（macOS の clang は wasm32-unknown-unknown 非対応）。
  macos-arm64-smoke:
    name: macOS arm64 (Apple Silicon)
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Nim toolchain
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.0.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust tests and Nim tests (Apple Silicon native)
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          ./test.sh
